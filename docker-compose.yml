services:
  mysql:
    image: mysql:8.0
    container_name: bookstack_db
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - TZ=${TZ}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - net-caddy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5

  bookstack:
    image: solidnerd/bookstack:26.3.2
    container_name: bookstack
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - net-caddy
    environment:
      - DB_HOST=mysql:3306
      - DB_DATABASE=${DB_NAME}
      - DB_USERNAME=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - APP_URL=${APP_URL}
      - APP_KEY=${APP_KEY}
      - APP_PROXIES=*
      - APACHE_SERVER_NAME=book.ad.agson.co.id
      - APP_THEME=custom
      - TZ=${TZ}

      # OIDC Auth
      - AUTH_METHOD=oidc
      - OIDC_NAME="Login Agson"
      - OIDC_DISPLAY_NAME_CLAIMS=name
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      - OIDC_ISSUER=${OIDC_ISSUER}
      - OIDC_ISSUER_DISCOVER=true
      - OIDC_END_SESSION_ENDPOINT=${OIDC_LOGOUT_ENDPOINT}
      - OIDC_EMAIL_CLAIMS=email
      - ALLOW_PASSWORD_LOGIN=true

    ports:
      - "8080:8080"
    volumes:
      - uploads:/var/www/bookstack/public/uploads
      - storage-uploads:/var/www/bookstack/storage/uploads
      - ./themes:/var/www/bookstack/themes
    restart: unless-stopped

volumes:
  mysql-data:
  uploads:
  storage-uploads:

networks:
  net-caddy:
    external: true
